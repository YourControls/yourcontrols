shared:
  - # Deice
    type: NumSet
    var_name: A:PITOT HEAT SWITCH:1
    var_units: Enum
    var_type: i32
    event_name: PITOT_HEAT_SET
    event_param: 1
  -
    type: NumSet
    var_name: A:PITOT HEAT SWITCH:2
    var_units: Enum
    var_type: i32
    event_name: PITOT_HEAT_SET
    event_param: 2
  -
    type: ToggleSwitch
    var_name: A:STRUCTURAL DEICE SWITCH
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_STRUCTURAL_DEICE
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:CIRCUIT SWITCH ON:73
    var_units: Bool
    var_type: bool
    event_name: ELECTRICAL_CIRCUIT_TOGGLE
    event_param: 73
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:CIRCUIT SWITCH ON:74
    var_units: Bool
    var_type: bool
    event_name: ELECTRICAL_CIRCUIT_TOGGLE
    event_param: 74
    use_calculator: true
  -
    type: CustomCalculator
    get: (B:DEICE_Propeller_1_Toggle)
    set: (>B:DEICE_Propeller_1_Toggle)

  - # Compartment Door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:3
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 4
    use_calculator: true

  - # Elec buttons
    type: CustomCalculator
    get: (B:ELECTRICAL_MAIN_BUTTON_PUSH)
    set: (>B:ELECTRICAL_MAIN_BUTTON_PUSH)
  -
    type: CustomCalculator
    get: (B:ELECTRICAL_STANDBY_BUTTON_PUSH)
    set: (>B:ELECTRICAL_STANDBY_BUTTON_PUSH)

  - # Engine
    type: NumSet
    var_name: A:GENERAL ENG PROPELLER LEVER POSITION:1
    var_units: Position 16k
    var_type: f64
    event_name: PROP_PITCH1_SET
    use_calculator: true
    unreliable: true

  - # Ignition
    type: CustomCalculator
    get: (B:ENGINE_Ignition_1) 0 ==
    set: 0 (>B:ENGINE_Ignition_1_Set)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (B:ENGINE_Ignition_1) 1 ==
    set: 1 (>B:ENGINE_Ignition_1_Set)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (B:ENGINE_Ignition_1) 2 ==
    set: 2 (>B:ENGINE_Ignition_1_Set)
    condition:
      equals:
        F64: 1.0

  - # Starter
    type: CustomCalculator
    get: (L:XMLVAR_Starter) 0 ==
    set: 0 (>B:ENGINE_Starter_1_Set)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (L:XMLVAR_Starter) 1 ==
    set: 1 (>B:ENGINE_Starter_1_Set)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (L:XMLVAR_Starter) 2 ==
    set: 2 (>B:ENGINE_Starter_1_Set)
    condition:
      equals:
        F64: 1.0

  - # Fuel
    type: NumSet
    var_name: A:FUEL TANK SELECTOR:1
    var_units: Enum
    var_type: i32
    event_name: FUEL_SELECTOR_SET
    use_calculator: true
  -
    type: NumSet
    var_name: A:GENERAL ENG FUEL PUMP SWITCH EX1:1
