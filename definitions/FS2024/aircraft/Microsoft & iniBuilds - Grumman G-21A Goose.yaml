    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 2
    use_calculator: true
  -
    type: NumSet
    var_name: A:FUELSYSTEM VALVE SWITCH:3
    var_units: Bool
    var_type: i32
    event_name: FUELSYSTEM_VALVE_SET
    event_param: 3
    index_reversed: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:FUELSYSTEM VALVE SWITCH:4
    var_units: Bool
    var_type: i32
    event_name: FUELSYSTEM_VALVE_SET
    event_param: 4
    index_reversed: true
    use_calculator: true
