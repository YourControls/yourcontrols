# BendixKing KFC225 autopilot by Carenado.

shared:
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT MASTER
    var_units: Bool
    var_type: bool
    event_name: AP_MASTER
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT HEADING LOCK
    var_units: Bool
    var_type: bool
    event_name: AP_HDG_HOLD
    use_calculator: true
  -
    type: NumSet
    var_name: A:AUTOPILOT HEADING LOCK DIR:1
    var_units: Degrees
    var_type: f64
    event_name: HEADING_BUG_SET
    event_param: 1
  -
    type: NumSet
    var_name: A:AUTOPILOT ALTITUDE LOCK VAR:1
    var_units: Feet
    var_type: i32
    event_name: AP_ALT_VAR_SET_ENGLISH
    event_param: 1
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT FLIGHT DIRECTOR ACTIVE:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_FLIGHT_DIRECTOR
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:AUTOPILOT VERTICAL HOLD
    var_units: Bool
    var_type: i32
    event_name: AP_VS_SET
    use_calculator: true
  -
    type: NumSet
    var_name: A:AUTOPILOT VERTICAL HOLD VAR:1
    var_units: Feet per minute
    var_type: i32
    event_name: AP_VS_VAR_SET_ENGLISH
    event_param: 1
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT NAV1 LOCK
    var_units: Bool
    var_type: bool
    event_name: AP_NAV1_HOLD
    is_user_event: true
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT APPROACH HOLD
    var_units: Bool
    var_type: bool
    event_name: AP_APR_HOLD
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT BACKCOURSE HOLD
    var_units: Bool
    var_type: bool
    event_name: AP_BC_HOLD
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT YAW DAMPER
    var_units: Bool
    var_type: bool
    event_name: YAW_DAMPER_TOGGLE
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:GPS DRIVES NAV1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_GPS_DRIVES_NAV1
    cancel_h_events: true
    use_calculator: true

  - # ALT
    type: CustomCalculator
    get: (B:AUTOPILOT_ALTITUDE_HOLD_Toggle)
    set: (>B:AUTOPILOT_ALTITUDE_HOLD_Toggle)
  - # ARM
    type: CustomCalculator
    get: (B:AUTOPILOT_ARM_Toggle)
    set: (>B:AUTOPILOT_ARM_Toggle)

ignore:
  - KFC225_Push_AP
  - KFC225_Push_HDG
  - KFC225_Push_NAV
  - KFC225_Push_APR
  - KFC225_Push_REV
  - KFC225_Push_ALT
  - KFC225_Push_VS
  - KFC225_Push_UP
  - KFC225_Push_DN
  - KFC225_Push_ARM
  - KFC225_Knob_Inner_INC
  - KFC225_Knob_Inner_DEC
  - KFC225_Knob_Outer_INC
  - KFC225_Knob_Outer_DEC