    var_units: Percent
    var_type: f64
    event_name: LIGHT_POTENTIOMETER_SET
    event_param: 3
    index_reversed: true
    use_calculator: true

  - # Lights
    type: NumSet
    var_name: A:LIGHT STROBE:1
    var_units: Bool
    var_type: i32
    event_name: STROBES_SET
    event_param: 1
    use_calculator: true
