    event_param: 4
    index_reversed: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT PANEL:1
    var_units: Bool
    var_type: i32
    event_name: PANEL_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
