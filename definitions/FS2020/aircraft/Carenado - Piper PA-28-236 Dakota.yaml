    var_units: Percent
    var_type: f64
    event_name: CABIN_LIGHTS_POWER_SETTING_SET
    event_param: 1
    index_reversed: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT PANEL:2
    var_units: Bool
    var_type: i32
    event_name: PANEL_LIGHTS_SET
    event_param: 2
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT POTENTIOMETER:4
    var_units: Percent
    var_type: f64
