master:
  - # Controls
    type: NumSet
    var_name: L:INI_SIDESTICK1_POSITION_X
    var_units: Position 16k
    var_type: f64
    multiply_by: -16384
    event_name: AXIS_AILERONS_SET
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: L:INI_SIDESTICK1_POSITION_Y
    var_units: Position 16k
    var_type: f64
    multiply_by: -16384
    event_name: AXIS_ELEVATOR_SET
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: L:INI_RUDDER_PEDAL_POSITION
    var_units: Position 16k
    var_type: f64
    multiply_by: -16384
    event_name: AXIS_RUDDER_SET
    use_calculator: true
    unreliable: true

  - # Throttles
    type: NumSet
    var_name: L:INI_AXIS1_VALUE
    var_units: Number
    var_type: f64
    multiply_by: 16384
    event_name: THROTTLE1_SET
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: L:INI_AXIS2_VALUE
    var_units: Number
    var_type: f64
    multiply_by: 16384
    event_name: THROTTLE2_SET
    use_calculator: true
    unreliable: true

  - # Fuel
    type: var
    var_name: L:INI_FUEL_WEIGHT_LEFT_OUTER
    var_type: i32
    interpolate: Default
  -
    type: var
    var_name: L:INI_FUEL_WEIGHT_LEFT_INNER
    var_type: i32
    interpolate: Default
  -
    type: var
    var_name: L:INI_FUEL_WEIGHT_RIGHT_OUTER
    var_type: i32
    interpolate: Default
  -
    type: var
    var_name: L:INI_FUEL_WEIGHT_RIGHT_INNER
    var_type: i32
    interpolate: Default
  -
    type: var
    var_name: L:INI_FUEL_WEIGHT_CENTER
    var_type: i32
    interpolate: Default
  -
    type: var
    var_name: L:INI_FUEL_WEIGHT_CENTER2
    var_type: i32
    interpolate: Default
  -
    type: var
    var_name: L:INI_FUEL_WEIGHT_TRIM
    var_type: i32
    interpolate: Default

