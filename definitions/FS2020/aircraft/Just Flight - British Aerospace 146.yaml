# Version 0.2.1

include:
  - definitions/FS2020/modules/general.yaml
  - definitions/FS2020/modules/navigation.yaml
  - definitions/FS2020/modules/payload.yaml

shared:
  - # Altimeters
    type: NumSet
    var_name: A:KOHLSMAN SETTING MB:3
    var_units: Millibars scaler 16
    var_type: f64
    event_name: KOHLSMAN_SET
    event_param: 3
  -
    type: NumSet
    var_name: A:KOHLSMAN SETTING MB:4
    var_units: Millibars scaler 16
    var_type: f64
    event_name: KOHLSMAN_SET
    event_param: 4

  - # Brakes
    type: NumSet
    var_name: A:BRAKE LEFT POSITION EX1
    var_units: Position 32k
    var_type: f64
    add_by: -16384
    event_name: AXIS_LEFT_BRAKE_SET
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: A:BRAKE RIGHT POSITION EX1
    var_units: Position 32k
    var_type: f64
    add_by: -16384
    event_name: AXIS_RIGHT_BRAKE_SET
    use_calculator: true
    unreliable: true

  - # Radios
    type: NumSet
    var_name: A:COM ACTIVE FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: COM_RADIO_SET_HZ
    use_calculator: true
  -
    type: NumSet
    var_name: A:COM ACTIVE FREQUENCY:2
    var_units: Hz
    var_type: i32
    event_name: COM2_RADIO_SET_HZ
    use_calculator: true
  -
    type: NumSet
    var_name: A:COM STANDBY FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: COM_STBY_RADIO_SET_HZ
    use_calculator: true
  -
    type: NumSet
    var_name: A:COM STANDBY FREQUENCY:2
    var_units: Hz
    var_type: i32
    event_name: COM2_STBY_RADIO_SET_HZ
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV ACTIVE FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: NAV1_RADIO_SET_HZ
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV ACTIVE FREQUENCY:2
    var_units: Hz
    var_type: i32
    event_name: NAV2_RADIO_SET_HZ
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV STANDBY FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: NAV1_STBY_SET_HZ
    use_calculator: true

  - # Transponder (backup)
    type: NumSet
    var_name: A:TRANSPONDER CODE:1
    var_units: Bco16
    var_type: i32
    event_name: XPNDR_SET
    event_param: 1

  - # Trim
    type: NumSet
    var_name: A:RUDDER TRIM PCT
    var_units: Percent scaler 16k
    var_type: f64
    event_name: RUDDER_TRIM_SET_EX1
    use_calculator: true
    unreliable: true
  -
    type: var
    var_name: L:PED_MID_Elev_trim_wheel
    var_type: f64
    condition:
      var:
        var_name: A:AUTOPILOT MASTER
        var_units: Bool
        var_type: bool
      equals:
        Bool: false
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: A:AILERON TRIM PCT
    var_units: Percent scaler 16k
    var_type: f64
    event_name: AILERON_TRIM_SET_EX1
    use_calculator: true
    unreliable: true

  - # Payload
    type: var
    var_name: A:PAYLOAD STATION WEIGHT:11
    var_units: Pounds
    var_type: f64
    unreliable: true
  -
    type: var
    var_name: A:PAYLOAD STATION WEIGHT:12
    var_units: Pounds
    var_type: f64
    unreliable: true
  -
    type: var
    var_name: A:PAYLOAD STATION WEIGHT:13
    var_units: Pounds
    var_type: f64
    unreliable: true
  -
    type: var
    var_name: A:PAYLOAD STATION WEIGHT:14
    var_units: Pounds
    var_type: f64
    unreliable: true

