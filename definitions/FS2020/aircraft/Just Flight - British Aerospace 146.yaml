master:
  - # Controls
    type: NumSet
    var_name: A:ELEVATOR POSITION
    var_units: Position 16k
    var_type: f64
    multiply_by: -1
    event_name: AXIS_ELEVATOR_SET
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: A:AILERON POSITION
    var_units: Position 16k
    var_type: f64
    multiply_by: -1
    event_name: AXIS_AILERONS_SET
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: A:RUDDER POSITION
    var_units: Position 16k
    var_type: f64
    multiply_by: -1
    event_name: AXIS_RUDDER_SET
    use_calculator: true
    unreliable: true

  - # Throttles
    type: var
    var_name: L:PED_MID_Eng1_throttle_shaft_VC
    interpolate: Default
  -
    type: var
    var_name: L:PED_MID_Eng2_throttle_shaft_VC
    interpolate: Default
  -
    type: var
    var_name: L:PED_MID_Eng3_throttle_shaft_VC
    interpolate: Default
  -
    type: var
    var_name: L:PED_MID_Eng4_throttle_shaft_VC
    interpolate: Default

